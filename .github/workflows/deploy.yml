name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d ' \n\r\t' | base64 -d > ~/.ssh/deploy_key
          printf '\n' >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@178.104.72.166 "
            git config --global --add safe.directory /home/messagingapp/messagingtool &&
            cd /home/messagingapp/messagingtool &&
            git pull &&
            npm run build &&
            systemctl restart messaging.service
          "
