name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key root@178.104.72.166 "
            git config --global --add safe.directory /home/messagingapp/messagingtool &&
            cd /home/messagingapp/messagingtool &&
            git fetch origin master &&
            git reset --hard origin/master &&
            npm ci &&
            npm run build &&
            systemctl restart messaging.service
          "
